<!DOCTYPE html><html class="dark" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>PSP3 – Campaña Política | Isaac Valarezo</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface":                   "rgb(var(--c-surface) / <alpha-value>)",
          "surface-container-low":     "rgb(var(--c-surface-container-low) / <alpha-value>)",
          "surface-container":         "rgb(var(--c-surface-container) / <alpha-value>)",
          "surface-container-high":    "rgb(var(--c-surface-container-high) / <alpha-value>)",
          "surface-container-highest": "rgb(var(--c-surface-container-highest) / <alpha-value>)",
          "surface-container-lowest":  "rgb(var(--c-surface-container-lowest) / <alpha-value>)",
          "on-surface":                "rgb(var(--c-on-surface) / <alpha-value>)",
          "on-surface-variant":        "rgb(var(--c-on-surface-variant) / <alpha-value>)",
          "primary":                   "rgb(var(--c-primary) / <alpha-value>)",
          "on-primary":                "rgb(var(--c-on-primary) / <alpha-value>)",
          "primary-container":         "rgb(var(--c-primary-container) / <alpha-value>)",
          "on-primary-container":      "rgb(var(--c-on-primary-container) / <alpha-value>)",
          "outline":                   "rgb(var(--c-outline) / <alpha-value>)",
          "outline-variant":           "rgb(var(--c-outline-variant) / <alpha-value>)",
        },
        fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
      },
    },
  }
</script>
<style>
  :root {
    --c-surface: 255 251 255; --c-surface-container-low: 249 240 255;
    --c-surface-container: 243 233 255; --c-surface-container-high: 236 220 255;
    --c-surface-container-highest: 230 215 245; --c-surface-container-lowest: 255 255 255;
    --c-on-surface: 29 26 34; --c-on-surface-variant: 74 68 83;
    --c-primary: 106 11 170; --c-on-primary: 255 255 255;
    --c-primary-container: 239 219 255; --c-on-primary-container: 46 0 78;
    --c-outline: 123 112 131; --c-outline-variant: 205 192 213;
  }
  .dark {
    --c-surface: 26 9 53; --c-surface-container-low: 35 18 61;
    --c-surface-container: 39 22 66; --c-surface-container-high: 50 33 77;
    --c-surface-container-highest: 61 44 88; --c-surface-container-lowest: 21 3 48;
    --c-on-surface: 236 220 255; --c-on-surface-variant: 207 194 213;
    --c-primary: 224 182 255; --c-on-primary: 76 0 125;
    --c-primary-container: 125 43 189; --c-on-primary-container: 229 193 255;
    --c-outline: 152 141 158; --c-outline-variant: 76 67 83;
  }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgb(var(--c-surface)); }
  ::-webkit-scrollbar-thumb { background: rgb(var(--c-primary-container)); border-radius: 10px; }

  /* Lightbox */
  #lightbox { display: none; }
  #lightbox.open { display: flex; }
</style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">

<!-- Nav -->
<nav class="sticky top-0 z-50 bg-surface/80 backdrop-blur-[20px] border-b border-outline-variant/20">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-8 py-4">
    <a href="index.html" class="flex items-center gap-2 text-primary hover:opacity-80 transition-opacity font-semibold">
      <span class="material-symbols-outlined">arrow_back</span>
      Volver al CV
    </a>
    <span class="text-on-surface-variant text-sm font-['Manrope'] font-bold tracking-widest uppercase">Portafolio</span>
    <button id="theme-toggle" aria-label="Toggle theme" class="w-9 h-9 rounded-full flex items-center justify-center text-primary hover:bg-primary/10 transition-colors border border-outline-variant">
      <span id="theme-icon" class="material-symbols-outlined text-[20px]">light_mode</span>
    </button>
  </div>
</nav>

<!-- Header -->
<header class="relative py-20 px-8 overflow-hidden">
  <div class="absolute inset-0 z-0">
    <div class="absolute top-1/2 left-1/4 w-96 h-96 bg-primary-container/10 blur-[100px] rounded-full -translate-y-1/2"></div>
  </div>
  <div class="relative z-10 max-w-4xl mx-auto text-center">
    <span class="inline-block px-4 py-1 rounded-full bg-surface-container-highest text-primary text-xs font-bold tracking-widest uppercase mb-6">Freelance · Diseño Político</span>
    <h1 class="font-headline font-extrabold text-5xl md:text-6xl text-primary tracking-tighter leading-none mb-6">
      Partido Sociedad<br><span class="text-on-surface-variant font-light">Patriótica</span>
    </h1>
    <p class="text-on-surface-variant text-lg max-w-2xl mx-auto leading-relaxed">
      Trabajo para campaña política del Partido Sociedad Patriótica. Desarrollo de propaganda para los postulantes a la asamblea de Galápagos.
    </p>
  </div>
</header>

<!-- Gallery grid -->
<main class="max-w-7xl mx-auto px-8 pb-24">
  <div class="columns-2 md:columns-3 lg:columns-4 gap-4 space-y-4" id="gallery">
    <!-- 1080×1600 (1,728,000 px) — high resolution -->
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(0)">
      <img src="PSP3/AD.png" alt="PSP3 – AD" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(1)">
      <img src="PSP3/AG.png" alt="PSP3 – AG" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(2)">
      <img src="PSP3/AGT.png" alt="PSP3 – AGT" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(3)">
      <img src="PSP3/RDR.png" alt="PSP3 – RDR" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(4)">
      <img src="PSP3/RGR.png" alt="PSP3 – RGR" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(5)">
      <img src="PSP3/RGT.png" alt="PSP3 – RGT" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(6)">
      <img src="PSP3/VDR.png" alt="PSP3 – VDR" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(7)">
      <img src="PSP3/VGR.png" alt="PSP3 – VGR" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(8)">
      <img src="PSP3/VGT.png" alt="PSP3 – VGT" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <!-- 1920×600 (1,152,000 px) — lower resolution -->
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(9)">
      <img src="PSP3/BAf.png" alt="PSP3 – BAf" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
    <div class="break-inside-avoid cursor-pointer group" onclick="openLightbox(10)">
      <img src="PSP3/Bv.png" alt="PSP3 – Bv" class="w-full rounded-2xl border border-outline-variant/10 shadow-lg group-hover:scale-[1.02] group-hover:shadow-primary/20 group-hover:shadow-2xl transition-all duration-300">
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-50 bg-black/90 items-center justify-center p-4">
  <button onclick="closeLightbox()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-on-surface hover:bg-surface-container-high transition-colors">
    <span class="material-symbols-outlined">close</span>
  </button>
  <button onclick="prevImage()" class="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary hover:bg-surface-container-high transition-colors">
    <span class="material-symbols-outlined">chevron_left</span>
  </button>
  <button onclick="nextImage()" class="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary hover:bg-surface-container-high transition-colors">
    <span class="material-symbols-outlined">chevron_right</span>
  </button>
  <img id="lightbox-img" src="" alt="" class="max-h-[90vh] max-w-[90vw] rounded-2xl shadow-2xl object-contain">
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-on-surface-variant text-sm">
    <span id="lightbox-counter"></span>
  </div>
</div>

<script>
// Theme
(function () {
  const html = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-icon');
  function applyTheme(dark) {
    html.classList.toggle('dark', dark);
    icon.textContent = dark ? 'light_mode' : 'dark_mode';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }
  const saved = localStorage.getItem('theme');
  applyTheme(saved ? saved === 'dark' : true);
  btn.addEventListener('click', () => applyTheme(!html.classList.contains('dark')));
})();

// Lightbox
const images = [
  'PSP3/AD.png','PSP3/AG.png','PSP3/AGT.png',
  'PSP3/RDR.png','PSP3/RGR.png','PSP3/RGT.png',
  'PSP3/VDR.png','PSP3/VGR.png','PSP3/VGT.png',
  'PSP3/BAf.png','PSP3/Bv.png'
];
let current = 0;

function openLightbox(i) {
  current = i;
  document.getElementById('lightbox-img').src = images[i];
  document.getElementById('lightbox-counter').textContent = (i + 1) + ' / ' + images.length;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function prevImage() { openLightbox((current - 1 + images.length) % images.length); }
function nextImage() { openLightbox((current + 1) % images.length); }

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});
</script>
</body></html>
